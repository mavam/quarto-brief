$schema: https://m.canouil.dev/quarto-wizard/assets/schema/v1/extension-schema.json

formats:
  brief-pdf:
    subject:
      type: string
      description: Subject line shown before the letter body.
    opening:
      type: string
      description: Greeting line before the main letter content.
    closing:
      type: string
      description: Complimentary close before the signature block.
    signature:
      type: string
      description: Path to a signature image shown above sender name.
      completion:
        type: file
        extensions: [.png, .jpg, .jpeg, .svg]
    address:
      type: array
      description: Recipient address lines.
      items:
        type: string
    date:
      type: string
      description: Explicit letter date value.
    date_label:
      type: string
      description: Label caption used for the date field.
    place:
      type: string
      description: Location shown in the heading block.
    place_label:
      type: string
      description: Label caption used for the location field.
    yourmail:
      type: string
      description: Incoming correspondence reference value.
    yourmail_label:
      type: string
      description: Label caption used for the incoming mail field.
    yourref:
      type: string
      description: Recipient reference value.
    yourref_label:
      type: string
      description: Label caption used for the recipient reference field.
    myref:
      type: string
      description: Sender reference value.
    myref_label:
      type: string
      description: Label caption used for the sender reference field.
    customer:
      type: string
      description: Customer identifier value.
    customer_label:
      type: string
      description: Label caption used for the customer field.
    invoice:
      type: string
      description: Invoice number value.
    invoice_label:
      type: string
      description: Label caption used for the invoice field.
    fontsize:
      type: string
      description: Base document font size such as 10pt, 11pt, or 12pt.
    cc:
      type: array
      description: Carbon copy recipients listed at letter end.
      items:
        type: string
    ps:
      type: string
      description: Optional postscript appended after the closing.
    encl:
      type: array
      description: Enclosure labels listed at letter end.
      items:
        type: string
